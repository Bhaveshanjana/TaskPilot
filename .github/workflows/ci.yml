name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # cache: "pnpm"
          # cache-dependency-path: "./client/pnpm-lock.yaml"

      - name: Install dependencies (Client)
        run: |
          cd client
          pnpm install --no-frozen-lockfile

      - name: Lint client
        run: |
          cd client
          pnpm run lint

      - name: Build client
        run: |
          cd client
          pnpm run build

      - name: Install dependencies (Backend)
        run: |
          cd server
          pnpm install
